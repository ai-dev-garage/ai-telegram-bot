<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Jobs — AI Dev Garage')}"></head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-4">

  <div class="flex items-center justify-between">
    <h1 class="text-lg font-semibold text-gray-800">Jobs</h1>

    <!-- Status filter -->
    <select name="status"
            class="border border-gray-300 rounded-md px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            hx-get="/ui/jobs"
            hx-target="#job-table-container"
            hx-swap="innerHTML"
            hx-push-url="true"
            hx-include="this">
      <option value="">All statuses</option>
      <option th:each="s : ${statuses}"
              th:value="${s}"
              th:text="${s}"
              th:selected="${s == currentStatus}">
      </option>
    </select>
  </div>

  <!-- Job table -->
  <div id="job-table-container"
       class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
    <div th:replace="~{fragments/job-table :: table}"></div>
  </div>

</main>
</body>
</html>
