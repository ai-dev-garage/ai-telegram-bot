<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard — AI Dev Garage')}"></head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-7xl mx-auto px-4 py-6 space-y-8">

  <!-- Status counts -->
  <section>
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Job counts</h2>
    <div hx-get="/ui/dashboard/counts"
         hx-trigger="every 30s"
         hx-target="this"
         hx-swap="innerHTML">
      <div th:replace="~{fragments/status-counts :: counts}"></div>
    </div>
  </section>

  <!-- Latest failures -->
  <section>
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Recent failures</h2>
    <div class="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden"
         hx-get="/ui/dashboard/failures"
         hx-trigger="every 30s"
         hx-target="this"
         hx-swap="innerHTML">
      <div th:replace="~{fragments/job-table :: table}"></div>
    </div>
  </section>

</main>
</body>
</html>
