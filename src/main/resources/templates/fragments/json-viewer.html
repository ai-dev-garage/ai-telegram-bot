<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="viewer(label, json)">
  <details open class="group">
    <summary class="cursor-pointer text-sm font-medium text-gray-700 select-none mb-1"
             th:text="${label}"></summary>
    <pre class="bg-gray-50 border border-gray-200 rounded-lg p-4 text-xs font-mono whitespace-pre-wrap break-all max-h-96 overflow-auto"
         th:text="${json}"></pre>
  </details>
</div>

</html>
