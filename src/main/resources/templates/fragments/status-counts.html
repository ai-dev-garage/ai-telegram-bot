<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="counts" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
  <div th:each="c : ${counts}"
       class="bg-white rounded-lg border border-gray-200 shadow-sm p-4 flex flex-col items-center gap-1">
    <span th:replace="~{fragments/status-badge :: badge(${c.status()}, ${c.badgeClass()})}"></span>
    <span class="text-2xl font-bold text-gray-800" th:text="${c.count()}">0</span>
  </div>
</div>
</html>
