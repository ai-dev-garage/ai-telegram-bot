<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Error — AI Dev Garage')}"></head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="max-w-3xl mx-auto px-4 py-10">
  <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-8 space-y-4">
    <p class="text-sm font-semibold text-red-600 uppercase tracking-wide">Something went wrong</p>
    <h1 class="text-2xl font-bold text-gray-900">
      <span th:text="${status}">404</span>
      <span th:if="${error != null}" th:text="' — ' + ${error}"></span>
    </h1>
    <p class="text-gray-600" th:if="${message != null and !#strings.isEmpty(message)}" th:text="${message}"></p>
    <p class="text-sm text-gray-500" th:if="${path != null}">
      Request path: <code class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-800" th:text="${path}">/unknown</code>
    </p>
    <p class="text-sm text-gray-500">
      Use the navigation above, or go to the
      <a href="/ui" class="text-indigo-600 hover:text-indigo-800">dashboard</a>.
    </p>
  </div>
</main>
</body>
</html>
