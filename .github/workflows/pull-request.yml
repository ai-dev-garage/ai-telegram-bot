name: PR checks

on:
  pull_request:
    branches: [master]

jobs:
  branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Require feature/* branch (except dependabot)
        if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
        run: |
          ref="${{ github.head_ref }}"
          case "$ref" in
            feature/*) exit 0 ;;
            *) echo "Branch must match feature/<name>, got: $ref"; exit 1 ;;
          esac

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test
        run: ./gradlew test --no-daemon
